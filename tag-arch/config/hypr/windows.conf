# Hyprland 0.55 window/layer rules use the v3 "special category" block syntax.
# Matchers are `match:<prop> = <regex>`, effects are plain fields, and every
# block must start with a unique `name`.

# use floating window for clipboard history
windowrule {
  name = clipse
  match:class = (clipse)
  float = true
  size = 622 652
  stay_focused = true
}

# Application-specific animation
layerrule {
  name = walker-noanim
  match:namespace = walker
  no_anim = true
}

# Hide border on screenshots
layerrule {
  name = selection-noanim
  match:namespace = selection
  no_anim = true
}

# Float and center file pickers
windowrule {
  name = file-pickers
  match:class = xdg-desktop-portal-gtk
  match:title = ^(Open.*Files?|Save.*Files?|All Files|Save)
  float = true
  center = true
}

# Float and center sound, bluetooth, wifi settings, and a buncha other stuff
windowrule {
  name = float-utils
  match:class = ^(Wiremix|blueberry.py|Impala|Activity|About|org.gnome.NautilusPreviewer|1Password|Yazi|DotfilesTui|Bluetui)$
  float = true
  center = true
  size = 800 600
}

# add opacity to most windows, especially terminals
windowrule {
  name = opacity-default
  match:class = .*
  opacity = 0.97 0.9
}

windowrule {
  name = opacity-chromium
  match:class = ^(Chromium|chromium|google-chrome|google-chrome-unstable)$
  opacity = 1 0.97
}

windowrule {
  name = opacity-youtube
  match:initial_title = ^(youtube.com_/)$
  opacity = 1 1
}

windowrule {
  name = opacity-media
  match:class = ^(zoom|vlc|mpv|com.github.PintaProject.Pinta|imv|org.gnome.NautilusPreviewer)$
  opacity = 1 1
}
