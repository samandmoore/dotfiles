input {
  kb_layout = us
  # remap capslock to ctrl, swap alt and super
  kb_options = ctrl:nocaps, altwin:swap_lalt_lwin
  repeat_rate = 60
  repeat_delay = 200
  touchpad {
    natural_scroll = true
    # Use two-finger click for right-click
    clickfinger_behavior = true
    scroll_factor = 0.4
  }
}

# https://wiki.hypr.land/Configuring/Advanced-and-Cool/Gestures/
# In Hyprland 0.55+ the `gestures { workspace_swipe = true }` master toggle was
# removed; swipe gestures are now enabled with the `gesture` keyword.
gesture = 3, horizontal, workspace

gestures {
  # allow swiping beyond adjacent workspaces
  workspace_swipe_forever = true
  # allow switching to empty workspaces too
  workspace_swipe_use_r = true
}

# faster scrolling in terminal
windowrule {
  name = kitty-scroll
  match:class = kitty
  scroll_touchpad = 1.5
}
